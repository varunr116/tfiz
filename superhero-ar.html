<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>SuperheroAR</title>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
      crossorigin="anonymous"
    ></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: "Courier New", monospace;
      }
      #video {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
      }
      #video.mirror {
        transform: scaleX(-1);
      }
      #btn-flip {
        position: fixed;
        bottom: 80px;
        right: 16px;
        z-index: 50;
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid rgba(0, 229, 255, 0.4);
        color: #00e5ff;
        font-family: "Courier New", monospace;
        font-size: 18px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.2s,
          background 0.2s;
      }
      #btn-flip:active {
        transform: scale(0.88);
        background: rgba(0, 229, 255, 0.2);
      }
      #cam-mode-pill {
        position: fixed;
        bottom: 132px;
        right: 16px;
        z-index: 50;
        background: rgba(0, 0, 0, 0.65);
        border: 1px solid rgba(0, 229, 255, 0.25);
        border-radius: 4px;
        padding: 3px 8px;
        font-family: "Courier New", monospace;
        font-size: 8px;
        letter-spacing: 0.1em;
        color: #00e5ff;
        text-align: center;
        pointer-events: none;
      }
      #wing-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: none;
        pointer-events: none;
      }
      #wing-comp-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
        pointer-events: none;
      }
      #person-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 3;
        pointer-events: none;
      }
      #mask-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: none;
        pointer-events: none;
      }
      #mask-comp-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 4;
        pointer-events: none;
      }
      #overlay-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 6;
        pointer-events: none;
      }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 200;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        cursor: pointer;
        transition: opacity 0.6s ease;
      }
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .splash-ring {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 2px solid #00e5ff;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pulse-ring 2s ease-in-out infinite;
        position: relative;
      }
      .splash-ring::before {
        content: "";
        position: absolute;
        inset: 8px;
        border-radius: 50%;
        border: 1px solid rgba(0, 229, 255, 0.3);
        animation: pulse-ring 2s ease-in-out infinite 0.3s;
      }
      .splash-icon {
        font-size: 36px;
      }
      @keyframes pulse-ring {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.08);
          opacity: 0.7;
        }
      }
      .splash-title {
        color: #00e5ff;
        font-size: 13px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
      }
      .splash-sub {
        color: rgba(255, 255, 255, 0.4);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        text-align: center;
        padding: 0 32px;
      }
      #debug-hud {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 50;
        display: flex;
        flex-direction: column;
        gap: 5px;
        pointer-events: none;
      }
      .hud-pill {
        background: rgba(0, 0, 0, 0.65);
        border: 1px solid rgba(0, 229, 255, 0.25);
        border-radius: 4px;
        padding: 4px 10px;
        font-size: 10px;
        letter-spacing: 0.07em;
        color: #00e5ff;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .hud-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #00e5ff;
        animation: blink 1.2s ease-in-out infinite;
      }
      .hud-dot.red {
        background: #ff4444;
        animation: none;
      }
      .hud-dot.yellow {
        background: #ffcc00;
      }
      .hud-dot.off {
        background: #444;
        animation: none;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.2;
        }
      }
      #exp-switcher {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 50;
        display: flex;
        align-items: center;
      }
      .exp-arrow {
        background: rgba(0, 0, 0, 0.75);
        border: 1px solid rgba(0, 229, 255, 0.45);
        color: #00e5ff;
        font-size: 16px;
        padding: 11px 18px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .exp-arrow:hover {
        background: rgba(0, 229, 255, 0.18);
      }
      .exp-arrow:first-child {
        border-radius: 8px 0 0 8px;
        border-right: none;
      }
      .exp-arrow:last-child {
        border-radius: 0 8px 8px 0;
        border-left: none;
      }
      #exp-name {
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid rgba(0, 229, 255, 0.45);
        color: #00e5ff;
        font-family: "Courier New", monospace;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        padding: 11px 26px;
        min-width: 220px;
        text-align: center;
        transition: opacity 0.25s;
      }
      #exp-name.flash {
        opacity: 0;
      }
      #controls {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 50;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .ctrl-btn {
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(0, 229, 255, 0.3);
        color: #00e5ff;
        font-family: "Courier New", monospace;
        font-size: 9px;
        letter-spacing: 0.1em;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-ring"><span class="splash-icon">⚡</span></div>
      <div class="splash-title">SuperheroAR</div>
      <div class="splash-sub">Tap to activate &amp; allow camera</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="wing-canvas"></canvas>
    <canvas id="wing-comp-canvas"></canvas>
    <canvas id="person-canvas"></canvas>
    <canvas id="mask-canvas"></canvas>
    <canvas id="mask-comp-canvas"></canvas>
    <canvas id="overlay-canvas"></canvas>
    <div id="debug-hud">
      <div class="hud-pill">
        <div class="hud-dot red" id="cam-dot"></div>
        <span id="cam-status">CAMERA OFFLINE</span>
      </div>
      <div class="hud-pill">
        <div class="hud-dot off" id="mp-dot"></div>
        <span id="mp-status">MEDIAPIPE LOADING</span>
      </div>
      <div class="hud-pill">
        <div class="hud-dot off" id="fps-dot"></div>
        <span id="fps-status">FPS --</span>
      </div>
      <div class="hud-pill">
        <div class="hud-dot off" id="seg-dot"></div>
        <span id="seg-status">SEG --</span>
      </div>
      <div class="hud-pill">
        <div class="hud-dot off" id="exp-dot"></div>
        <span id="exp-status">EXP --</span>
      </div>
      <div class="hud-pill" id="perf-pill" style="display: none">
        <div class="hud-dot yellow"></div>
        <span>MOBILE MODE</span>
      </div>
    </div>
    <div id="controls">
      <button class="ctrl-btn" id="btn-seg">MASK DEBUG: OFF</button>
    </div>
    <div id="cam-mode-pill">FRONT</div>
    <button id="btn-flip" title="Flip Camera">&#x1F504;</button>
    <div id="exp-switcher">
      <button class="exp-arrow" id="btn-prev">&#9664;</button>
      <div id="exp-name">ANGEL WINGS</div>
      <button class="exp-arrow" id="btn-next">&#9654;</button>
    </div>

    <script>
      "use strict"

      // ═══════════════════════════════════════════════════════════
      // LANDMARK INDICES
      // ═══════════════════════════════════════════════════════════
      const POSE_IDX = {
        NOSE: 0,
        L_EYE: 2,
        R_EYE: 5,
        L_SHOULDER: 11,
        R_SHOULDER: 12,
        L_ELBOW: 13,
        R_ELBOW: 14,
        L_WRIST: 15,
        R_WRIST: 16,
        L_HIP: 23,
        R_HIP: 24,
      }

      const HAND_IDX = {
        WRIST: 0,
        THUMB_CMC: 1,
        THUMB_MCP: 2,
        THUMB_IP: 3,
        THUMB_TIP: 4,
        INDEX_MCP: 5,
        INDEX_PIP: 6,
        INDEX_DIP: 7,
        INDEX_TIP: 8,
        MIDDLE_MCP: 9,
        MIDDLE_PIP: 10,
        MIDDLE_DIP: 11,
        MIDDLE_TIP: 12,
        RING_MCP: 13,
        RING_PIP: 14,
        RING_DIP: 15,
        RING_TIP: 16,
        PINKY_MCP: 17,
        PINKY_PIP: 18,
        PINKY_DIP: 19,
        PINKY_TIP: 20,
      }

      // Face landmark indices (Holistic with refineFaceLandmarks:false uses standard 468)
      const FACE_IDX = {
        NOSE_TIP: 1,
        FOREHEAD: 10, // top center
        CHIN: 152,
        L_EYE_L: 33, // left eye outer corner
        L_EYE_R: 133, // left eye inner corner
        L_EYE_TOP: 159,
        L_EYE_BOT: 145,
        R_EYE_L: 362,
        R_EYE_R: 263,
        R_EYE_TOP: 386,
        R_EYE_BOT: 374,
        L_TEMPLE: 234,
        R_TEMPLE: 454,
        L_BROW_OUT: 70,
        R_BROW_OUT: 300,
        L_BROW_TOP: 105, // above left brow arch
        R_BROW_TOP: 334, // above right brow arch
        GLABELLA: 168, // between eyes
        L_CHEEK: 116,
        R_CHEEK: 345,
      }

      const FINGER_CHAINS = [
        [0, 1, 2, 3, 4],
        [0, 5, 6, 7, 8],
        [0, 9, 10, 11, 12],
        [0, 13, 14, 15, 16],
        [0, 17, 18, 19, 20],
      ]
      const FINGER_TIPS = new Set([4, 8, 12, 16, 20])
      const KNUCKLES = new Set([5, 9, 13, 17])

      // ═══════════════════════════════════════════════════════════
      // SHARED STATE
      // ═══════════════════════════════════════════════════════════
      // Detect mobile once — used throughout for perf tuning
      const isMobile =
        /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) ||
        (navigator.maxTouchPoints > 1 && window.innerWidth < 1024)

      const state = {
        started: false,
        screen: { w: 0, h: 0 },
        toScreen: null,
        fps: { count: 0, last: performance.now() },
        segDebug: false,
        expIndex: 0,
        wingPos: { pos: null, scale: 1, active: false },
        glbLoaded: false,
        // Face landmarker (for Wolverine — kept from original)
        faceLandmarker: null,
        faceLandmarkerReady: false,
        lastFaceMatrix: null,
        // Camera facing — true = front (selfie), false = back (environment)
        isFrontCamera: true,
      }

      // Mobile shadow limiter — called once per frame per ctx
      // On mobile we patch the ctx to suppress expensive shadow blurs
      function applyMobileShadow(ctx, color, blur) {
        ctx.shadowColor = color
        ctx.shadowBlur = isMobile ? Math.min(blur, 6) : blur
      }

      // ═══════════════════════════════════════════════════════════
      // DOM
      // ═══════════════════════════════════════════════════════════
      const splash = document.getElementById("splash")
      const video = document.getElementById("video")
      const wingCanvas = document.getElementById("wing-canvas")
      const wingCompCanvas = document.getElementById("wing-comp-canvas")
      const personCanvas = document.getElementById("person-canvas")
      const maskCanvas = document.getElementById("mask-canvas")
      const maskCompCanvas = document.getElementById("mask-comp-canvas")
      const overlayCanvas = document.getElementById("overlay-canvas")
      const wctx = wingCompCanvas.getContext("2d")
      const pctx = personCanvas.getContext("2d")
      const mctx = maskCompCanvas.getContext("2d")
      const octx = overlayCanvas.getContext("2d")

      const $ = (id) => document.getElementById(id)
      const camDot = $("cam-dot"),
        camStatus = $("cam-status")
      const mpDot = $("mp-dot"),
        mpStatus = $("mp-status")
      const fpsDot = $("fps-dot"),
        fpsStatus = $("fps-status")
      const segDot = $("seg-dot"),
        segStatus = $("seg-status")
      const expDot = $("exp-dot"),
        expStatus = $("exp-status")
      const expNameEl = $("exp-name")

      // ═══════════════════════════════════════════════════════════
      // THREE.JS — WING RENDERER + MASK RENDERER
      // ═══════════════════════════════════════════════════════════
      let wingRenderer,
        wingScene,
        wingCamera,
        wingGroup = null
      let maskRenderer,
        maskScene,
        maskCamera,
        maskGroup = null
      let maskGlbLoaded = false

      function initThree() {
        // ── Wing renderer ──
        const AA = !isMobile
        const DPR = isMobile
          ? Math.min(window.devicePixelRatio, 1.5)
          : window.devicePixelRatio
        wingRenderer = new THREE.WebGLRenderer({
          canvas: wingCanvas,
          alpha: true,
          antialias: AA,
        })
        wingRenderer.setPixelRatio(DPR)
        wingRenderer.setSize(window.innerWidth, window.innerHeight)
        wingScene = new THREE.Scene()
        wingCamera = new THREE.PerspectiveCamera(
          60,
          window.innerWidth / window.innerHeight,
          0.01,
          200,
        )
        wingCamera.position.set(0, 0, 5)
        wingScene.add(new THREE.AmbientLight(0x334455, 1.2))
        const wKey = new THREE.DirectionalLight(0x88ccff, 1.8)
        wKey.position.set(0, 2, 3)
        wingScene.add(wKey)
        const wRim = new THREE.DirectionalLight(0x00e5ff, 1.0)
        wRim.position.set(0, -1, -2)
        wingScene.add(wRim)
        loadWingsGLB()

        // ── Mask renderer ──
        maskRenderer = new THREE.WebGLRenderer({
          canvas: maskCanvas,
          alpha: true,
          antialias: AA,
        })
        maskRenderer.setPixelRatio(DPR)
        maskRenderer.setSize(window.innerWidth, window.innerHeight)
        maskScene = new THREE.Scene()
        maskCamera = new THREE.PerspectiveCamera(
          63,
          window.innerWidth / window.innerHeight,
          0.01,
          1000,
        )
        maskCamera.position.set(0, 0, 0)
        maskScene.add(new THREE.AmbientLight(0x888888, 1.2))
        const mKey = new THREE.DirectionalLight(0xffffff, 2.0)
        mKey.position.set(0, 1, 1)
        maskScene.add(mKey)
        const mRim = new THREE.DirectionalLight(0x334466, 1.0)
        mRim.position.set(-1, -0.5, -1)
        maskScene.add(mRim)
        loadMaskGLB()

        // ── Shared render loop ──
        ;(function loop() {
          requestAnimationFrame(loop)
          const t = performance.now() / 1000
          if (wingGroup && wingGroup.visible) {
            wingGroup.rotation.z = Math.sin(t * 2.2) * 0.04
            wingGroup.rotation.x = Math.sin(t * 1.6) * 0.02
          }
          wingRenderer.render(wingScene, wingCamera)
          maskRenderer.render(maskScene, maskCamera)
        })()
      }

      function loadWingsGLB() {
        const s = document.createElement("script")
        s.src =
          "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"
        s.onload = () => {
          new THREE.GLTFLoader().load(
            "Wings.glb",
            (gltf) => {
              const model = gltf.scene
              const box = new THREE.Box3().setFromObject(model)
              const size = new THREE.Vector3()
              box.getSize(size)
              const sc = 4.0 / Math.max(size.x, size.y, size.z)
              model.scale.setScalar(sc)
              const center = new THREE.Vector3()
              box.getCenter(center)
              model.position.sub(center.multiplyScalar(sc))
              model.traverse((c) => {
                if (c.isMesh) {
                  c.material = c.material.clone()
                  c.material.emissive = new THREE.Color(0x001133)
                  c.material.emissiveIntensity = 0.35
                }
              })
              wingGroup = new THREE.Group()
              wingGroup.add(model)
              wingGroup.visible = false
              wingScene.add(wingGroup)
              state.glbLoaded = true
            },
            null,
            () => buildFallbackWings(),
          )
        }
        s.onerror = buildFallbackWings
        document.head.appendChild(s)
      }

      function buildFallbackWings() {
        wingGroup = new THREE.Group()
        const mat = new THREE.MeshStandardMaterial({
          color: 0x0055aa,
          emissive: new THREE.Color(0x001133),
          emissiveIntensity: 0.6,
          roughness: 0.3,
          metalness: 0.8,
          transparent: true,
          opacity: 0.9,
          side: THREE.DoubleSide,
        })
        const gm = new THREE.MeshStandardMaterial({
          color: 0x00e5ff,
          emissive: new THREE.Color(0x00e5ff),
          emissiveIntensity: 2.5,
          roughness: 0,
          metalness: 0,
          transparent: true,
          opacity: 0.85,
        })
        ;[[-1], [1]].forEach(([sign]) => {
          ;[
            { len: 1.0, w: 0.22, z: sign * 0.18 },
            { len: 1.4, w: 0.18, z: sign * 0.5 },
            { len: 1.1, w: 0.14, z: sign * 0.85 },
          ].forEach(({ len, w, z }) => {
            const sh = new THREE.Shape()
            sh.moveTo(-w * 0.5, 0)
            sh.lineTo(w * 0.5, 0)
            sh.lineTo(w * 0.12, len)
            sh.lineTo(-w * 0.12, len)
            sh.closePath()
            const m = new THREE.Mesh(
              new THREE.ExtrudeGeometry(sh, {
                depth: 0.02,
                bevelEnabled: false,
              }),
              mat,
            )
            m.rotation.z = z
            const sp = new THREE.Mesh(
              new THREE.BoxGeometry(0.016, len * 0.88, 0.016),
              gm,
            )
            sp.position.set(0, len * 0.44, 0.012)
            m.add(sp)
            wingGroup.add(m)
          })
        })
        wingGroup.visible = false
        wingScene.add(wingGroup)
        state.glbLoaded = true
      }

      function loadMaskGLB() {
        function tryLoad() {
          if (!THREE.GLTFLoader) {
            setTimeout(tryLoad, 300)
            return
          }
          new THREE.GLTFLoader().load(
            "Mask.glb",
            (gltf) => {
              const model = gltf.scene
              const box = new THREE.Box3().setFromObject(model)
              const size = new THREE.Vector3()
              box.getSize(size)
              const sc = 18.0 / Math.max(size.x, size.y, size.z)
              model.scale.setScalar(sc)
              const center = new THREE.Vector3()
              box.getCenter(center)
              model.position.sub(center.multiplyScalar(sc))
              maskGroup = new THREE.Group()
              maskGroup.add(model)
              maskGroup.visible = false
              maskGroup.matrixAutoUpdate = false
              maskScene.add(maskGroup)
              maskGlbLoaded = true
            },
            null,
            () => {
              maskGlbLoaded = true
            },
          )
        }
        tryLoad()
      }

      // ═══════════════════════════════════════════════════════════
      // COORDINATE HELPERS
      // ═══════════════════════════════════════════════════════════
      function buildCoordMapper(vw, vh, cw, ch) {
        const va = vw / vh,
          ca = cw / ch
        let sx, sy, ox, oy
        if (va > ca) {
          sy = ch
          sx = ch * va
          ox = (cw - sx) / 2
          oy = 0
        } else {
          sx = cw
          sy = cw / va
          ox = 0
          oy = (ch - sy) / 2
        }
        // mirror param: true = flip X (front camera), false = no flip (back camera)
        // callers can still override per-call; default now reads from state
        return (nx, ny, mirror = state.isFrontCamera) => ({
          x: ox + (mirror ? 1 - nx : nx) * sx,
          y: oy + ny * sy,
        })
      }

      function screenToWorld(nx, ny, depth, cam) {
        const v = new THREE.Vector3((1 - nx) * 2 - 1, -(ny * 2 - 1), 0.5)
        v.unproject(cam)
        return cam.position
          .clone()
          .add(v.sub(cam.position).normalize().multiplyScalar(depth))
      }

      // Helper: average of face landmark subset
      function faceAvg(face, indices) {
        let x = 0,
          y = 0,
          z = 0
        for (const i of indices) {
          x += face[i].x
          y += face[i].y
          z += face[i].z || 0
        }
        return {
          x: x / indices.length,
          y: y / indices.length,
          z: z / indices.length,
        }
      }

      // ═══════════════════════════════════════════════════════════
      // WING POSITIONING
      // ═══════════════════════════════════════════════════════════
      function updateWingPosition(pose) {
        if (!pose || !state.glbLoaded || !wingGroup) {
          if (wingGroup) wingGroup.visible = false
          return
        }
        const ls = pose[POSE_IDX.L_SHOULDER],
          rs = pose[POSE_IDX.R_SHOULDER]
        if (!ls || !rs) {
          wingGroup.visible = false
          return
        }
        const mx = (ls.x + rs.x) / 2,
          my = (ls.y + rs.y) / 2
        const sw = Math.abs(rs.x - ls.x)
        const sc = sw * 8.0
        const target = screenToWorld(mx, my, 5.8, wingCamera)
        const wp = state.wingPos
        if (!wp.active) {
          wp.pos = target.clone()
          wp.scale = sc
          wp.active = true
        } else {
          wp.pos.lerp(target, 0.12)
          wp.scale += (sc - wp.scale) * 0.12
        }
        wingGroup.position.copy(wp.pos)
        wingGroup.scale.setScalar(wp.scale)
        wingGroup.visible = true
      }

      // ═══════════════════════════════════════════════════════════
      // OCCLUSION COMPOSITE
      // ═══════════════════════════════════════════════════════════
      function compositeWings(segMask, showWings) {
        const W = state.screen.w,
          H = state.screen.h
        wctx.clearRect(0, 0, W, H)
        if (showWings) {
          wctx.drawImage(wingCanvas, 0, 0, W, H)
          if (segMask) {
            wctx.globalCompositeOperation = "destination-out"
            if (state.isFrontCamera) {
              // Front camera: segmask must be flipped to match mirrored video
              wctx.save()
              wctx.translate(W, 0)
              wctx.scale(-1, 1)
              wctx.drawImage(segMask, 0, 0, W, H)
              wctx.restore()
            } else {
              // Back camera: segmask already in correct orientation
              wctx.drawImage(segMask, 0, 0, W, H)
            }
            wctx.globalCompositeOperation = "source-over"
          }
        }
        pctx.clearRect(0, 0, W, H)
        if (segMask && state.segDebug) {
          if (state.isFrontCamera) {
            pctx.save()
            pctx.translate(W, 0)
            pctx.scale(-1, 1)
            pctx.drawImage(segMask, 0, 0, W, H)
            pctx.restore()
          } else {
            pctx.drawImage(segMask, 0, 0, W, H)
          }
          pctx.globalCompositeOperation = "source-in"
          pctx.fillStyle = "rgba(0,255,100,.35)"
          pctx.fillRect(0, 0, W, H)
          pctx.globalCompositeOperation = "source-over"
        }
        segDot.className = segMask
          ? "hud-dot" + (state.segDebug ? " yellow" : "")
          : "hud-dot off"
        segStatus.textContent = segMask
          ? "SEG " + (state.segDebug ? "[DEBUG]" : "✓")
          : "SEG —"
      }

      function compositeMask(active) {
        const W = state.screen.w,
          H = state.screen.h
        mctx.clearRect(0, 0, W, H)
        if (active && maskGlbLoaded) mctx.drawImage(maskCanvas, 0, 0, W, H)
      }

      // ═══════════════════════════════════════════════════════════
      // FACE LANDMARKER (Wolverine mask — kept from original)
      // ═══════════════════════════════════════════════════════════
      async function initFaceLandmarker() {
        try {
          const { FaceLandmarker, FilesetResolver } =
            await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs")
          const filesetResolver = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm",
          )
          state.faceLandmarker = await FaceLandmarker.createFromOptions(
            filesetResolver,
            {
              baseOptions: {
                modelAssetPath:
                  "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                delegate: "GPU",
              },
              outputFaceBlendshapes: false,
              outputFacialTransformationMatrixes: true,
              runningMode: "VIDEO",
              numFaces: 1,
            },
          )
          state.faceLandmarkerReady = true
        } catch (err) {
          console.error("FaceLandmarker init failed:", err)
          state.faceLandmarkerReady = false
          state.faceLandmarker = null
        }
      }

      let _lastFaceTs = -1
      function runFaceDetection() {
        if (!state.faceLandmarkerReady || !state.faceLandmarker) return
        if (!video.videoWidth || video.readyState < 2) return
        const now = performance.now()
        if (now <= _lastFaceTs) return
        _lastFaceTs = now
        try {
          const results = state.faceLandmarker.detectForVideo(video, now)
          if (results.facialTransformationMatrixes?.length > 0) {
            state.lastFaceMatrix = results.facialTransformationMatrixes[0].data
          } else {
            state.lastFaceMatrix = null
          }
        } catch (e) {
          state.lastFaceMatrix = null
        }
      }

      function applyFaceMatrix() {
        if (!maskGroup || !maskGlbLoaded) return
        if (!state.lastFaceMatrix) {
          maskGroup.visible = false
          return
        }
        const d = state.lastFaceMatrix
        const m = new THREE.Matrix4()
        m.set(
          -d[0],
          d[4],
          -d[8],
          -d[12],
          -d[1],
          d[5],
          -d[9],
          -d[13],
          -d[2],
          d[6],
          -d[10],
          d[14],
          d[3],
          d[7],
          d[11],
          d[15],
        )
        maskGroup.matrix.copy(m)
        maskGroup.matrixAutoUpdate = false
        maskGroup.visible = true
      }

      // ═══════════════════════════════════════════════════════════════════════════
      // EXPERIENCE 2 — ARC REACTOR HAND HUD (original)
      // ═══════════════════════════════════════════════════════════════════════════
      const particles = { left: [], right: [] }

      function spawnAndUpdateParticles(cx, cy, r, side) {
        const arr = particles[side]
        if (arr.length < (isMobile ? 8 : 20) && Math.random() < 0.4) {
          const a = Math.random() * Math.PI * 2
          arr.push({
            x: cx + Math.cos(a) * r,
            y: cy + Math.sin(a) * r,
            vx: (Math.random() - 0.5) * 3,
            vy: (Math.random() - 1) * 3,
            life: 1,
            decay: 0.035 + Math.random() * 0.04,
            size: 1.5 + Math.random() * 3,
            cyan: Math.random() < 0.6,
          })
        }
        for (let i = arr.length - 1; i >= 0; i--) {
          const p = arr[i]
          p.x += p.vx
          p.y += p.vy
          p.vy += 0.1
          p.life -= p.decay
          if (p.life <= 0) arr.splice(i, 1)
        }
      }

      function drawArcReactor(ctx, hand, side, t) {
        if (!hand || !state.toScreen) return
        const ts = state.toScreen
        const palm = ts(
          hand[HAND_IDX.MIDDLE_MCP].x,
          hand[HAND_IDX.MIDDLE_MCP].y,
        )
        const wrist = ts(hand[HAND_IDX.WRIST].x, hand[HAND_IDX.WRIST].y)
        const midTip = ts(
          hand[HAND_IDX.MIDDLE_TIP].x,
          hand[HAND_IDX.MIDDLE_TIP].y,
        )
        const r = Math.hypot(midTip.x - wrist.x, midTip.y - wrist.y) * 0.36
        if (r < 12) return
        const cx = palm.x,
          cy = palm.y
        const CYAN = "#00e5ff",
          ORG = "#ff6600"
        ctx.save()
        FINGER_CHAINS.forEach((chain) => {
          for (let i = 0; i < chain.length - 1; i++) {
            const pa = ts(hand[chain[i]].x, hand[chain[i]].y)
            const pb = ts(hand[chain[i + 1]].x, hand[chain[i + 1]].y)
            const ratio = i / (chain.length - 2)
            const g = ctx.createLinearGradient(pa.x, pa.y, pb.x, pb.y)
            g.addColorStop(0, "rgba(0,229,255," + (0.75 - ratio * 0.2) + ")")
            g.addColorStop(
              1,
              "rgba(255," +
                Math.round(80 + ratio * 150) +
                ",0," +
                (0.5 + ratio * 0.45) +
                ")",
            )
            ctx.strokeStyle = g
            ctx.lineWidth = 1.6 + ratio * 0.9
            ctx.shadowColor = CYAN
            ctx.shadowBlur = 7
            ctx.beginPath()
            ctx.moveTo(pa.x, pa.y)
            ctx.lineTo(pb.x, pb.y)
            ctx.stroke()
          }
        })
        hand.forEach((lm, i) => {
          const p = ts(lm.x, lm.y)
          const tip = FINGER_TIPS.has(i),
            knuc = KNUCKLES.has(i)
          const rad = tip ? 5.5 : knuc ? 4 : i === 0 ? 6.5 : 3
          const col = tip ? ORG : CYAN
          ctx.fillStyle = col
          ctx.shadowColor = col
          ctx.shadowBlur = tip ? 16 : 9
          ctx.globalAlpha = 0.92
          ctx.beginPath()
          ctx.arc(p.x, p.y, rad, 0, Math.PI * 2)
          ctx.fill()
        })
        ctx.globalAlpha = 1
        ctx.shadowBlur = 0
        const SEG = 28,
          GAP = 0.07
        ctx.strokeStyle = CYAN
        ctx.lineWidth = 1.5
        ctx.shadowColor = CYAN
        ctx.shadowBlur = 9
        for (let i = 0; i < SEG; i++) {
          const a0 = (i / SEG) * Math.PI * 2 + t * 0.45
          const a1 = ((i + 1) / SEG) * Math.PI * 2 - GAP + t * 0.45
          ctx.globalAlpha = i % 7 === 0 ? 1.0 : 0.6
          ctx.beginPath()
          ctx.arc(cx, cy, r * 1.18, a0, a1)
          ctx.stroke()
        }
        ctx.strokeStyle = ORG
        ctx.lineWidth = 2.2
        ctx.shadowColor = ORG
        ctx.shadowBlur = 14
        for (let i = 0; i < 6; i++) {
          if (i % 2 === 0) continue
          const a0 = (i / 6) * Math.PI * 2 - t * 2.0,
            a1 = ((i + 0.65) / 6) * Math.PI * 2 - t * 2.0
          ctx.globalAlpha = 0.85
          ctx.beginPath()
          ctx.arc(cx, cy, r * 0.84, a0, a1)
          ctx.stroke()
        }
        ctx.strokeStyle = "rgba(0,229,255,0.65)"
        ctx.lineWidth = 1
        ctx.shadowBlur = 5
        for (let i = 0; i < 14; i++) {
          const a0 = (i / 14) * Math.PI * 2 + t * 3.5,
            a1 = a0 + Math.PI / 16
          ctx.globalAlpha = 0.7
          ctx.beginPath()
          ctx.arc(cx, cy, r * 0.62, a0, a1)
          ctx.stroke()
        }
        ctx.shadowBlur = 5
        for (let i = 0; i < 24; i++) {
          const a = (i / 24) * Math.PI * 2 + t * 0.45,
            major = i % 6 === 0
          ctx.strokeStyle = major ? "#ffffff" : CYAN
          ctx.lineWidth = major ? 2.5 : 1
          ctx.globalAlpha = major ? 1.0 : 0.55
          const r0 = r * 1.21,
            r1 = r * (major ? 1.37 : 1.29)
          ctx.beginPath()
          ctx.moveTo(cx + Math.cos(a) * r0, cy + Math.sin(a) * r0)
          ctx.lineTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1)
          ctx.stroke()
        }
        const scanA = (t * 2.4) % (Math.PI * 2)
        ctx.globalAlpha = 0.22
        ctx.fillStyle = "rgba(0,229,255,0.18)"
        ctx.shadowBlur = 0
        ctx.beginPath()
        ctx.moveTo(cx, cy)
        ctx.arc(cx, cy, r * 1.15, scanA, scanA + Math.PI * 0.42)
        ctx.closePath()
        ctx.fill()
        ctx.globalAlpha = 0.75
        ctx.strokeStyle = CYAN
        ctx.lineWidth = 1.5
        ctx.shadowColor = CYAN
        ctx.shadowBlur = 12
        ctx.beginPath()
        ctx.moveTo(cx, cy)
        ctx.lineTo(
          cx + Math.cos(scanA) * r * 1.18,
          cy + Math.sin(scanA) * r * 1.18,
        )
        ctx.stroke()
        const pulse = 0.8 + Math.sin(t * 4.2) * 0.2,
          orbR = r * 0.21 * pulse
        const coroG = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 0.5)
        coroG.addColorStop(0, "rgba(0,229,255," + 0.22 * pulse + ")")
        coroG.addColorStop(1, "rgba(0,229,255,0)")
        ctx.globalAlpha = 1
        ctx.fillStyle = coroG
        ctx.shadowBlur = 0
        ctx.beginPath()
        ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2)
        ctx.fill()
        const coreG = ctx.createRadialGradient(cx, cy, 0, cx, cy, orbR)
        coreG.addColorStop(0, "rgba(255,230,90," + 0.98 * pulse + ")")
        coreG.addColorStop(0.45, "rgba(255,90,0," + 0.85 * pulse + ")")
        coreG.addColorStop(1, "rgba(0,180,255,0)")
        ctx.fillStyle = coreG
        ctx.shadowColor = "#ff8800"
        ctx.shadowBlur = 24
        ctx.beginPath()
        ctx.arc(cx, cy, orbR, 0, Math.PI * 2)
        ctx.fill()
        spawnAndUpdateParticles(cx, cy, r * 1.05, side)
        ctx.shadowBlur = 10
        particles[side].forEach((p) => {
          ctx.globalAlpha = p.life * 0.9
          ctx.fillStyle = p.cyan ? CYAN : ORG
          ctx.shadowColor = p.cyan ? CYAN : ORG
          ctx.beginPath()
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2)
          ctx.fill()
        })
        ctx.globalAlpha = 0.7
        ctx.strokeStyle = CYAN
        ctx.lineWidth = 1.8
        ctx.shadowBlur = 7
        const bR = r * 1.55,
          bS = r * 0.22
        ;[
          [1, 1],
          [1, -1],
          [-1, 1],
          [-1, -1],
        ].forEach(([sx, sy]) => {
          const bx = cx + sx * bR * 0.7,
            by = cy + sy * bR * 0.7
          ctx.beginPath()
          ctx.moveTo(bx, by - sy * bS)
          ctx.lineTo(bx, by)
          ctx.lineTo(bx + sx * bS, by)
          ctx.stroke()
        })
        const angle = Math.round(
          (Math.atan2(midTip.y - wrist.y, midTip.x - wrist.x) * 180) / Math.PI +
            90,
        )
        ctx.shadowColor = CYAN
        ctx.shadowBlur = 10
        ctx.fillStyle = CYAN
        ctx.textAlign = "center"
        ctx.globalAlpha = 0.92
        ctx.font = "bold " + Math.round(r * 0.28) + "px Courier New"
        ctx.fillText(Math.abs(angle) + "°", cx + r * 1.8, cy + r * 0.1)
        ctx.font = Math.round(r * 0.17) + "px Courier New"
        ctx.globalAlpha = 0.75
        const dots = ["", ".", "..", "..", ".", ""][Math.floor(t * 3) % 6]
        ctx.fillText("SCAN" + dots, cx, cy + r * 1.65)
        ctx.fillText(side.toUpperCase() + " HAND", cx, cy + r * 1.88)
        ctx.restore()
      }

      const EXP_HAND_HUD = {
        name: "⚡  ARC REACTOR",
        useWings: false,
        useMask: false,
        useFace: false,
        onFrame(results, ctx, t) {
          drawArcReactor(ctx, results.leftHandLandmarks, "left", t)

          expStatus.textContent =

              : "RAISE YOUR HAND"
        },
      }

      // ═══════════════════════════════════════════════════════════════════════════
      // EXPERIENCE 3 — WOLVERINE (original)
      // ═══════════════════════════════════════════════════════════════════════════
      function drawWolverineClaws(ctx, hand, t) {
        if (!hand || !state.toScreen) return
        const ts = state.toScreen
        const wrist = ts(hand[HAND_IDX.WRIST].x, hand[HAND_IDX.WRIST].y)
        const iMcp = ts(hand[HAND_IDX.INDEX_MCP].x, hand[HAND_IDX.INDEX_MCP].y)
        const mMcp = ts(
          hand[HAND_IDX.MIDDLE_MCP].x,
          hand[HAND_IDX.MIDDLE_MCP].y,
        )
        const rMcp = ts(hand[HAND_IDX.RING_MCP].x, hand[HAND_IDX.RING_MCP].y)
        const midTip = ts(
          hand[HAND_IDX.MIDDLE_TIP].x,
          hand[HAND_IDX.MIDDLE_TIP].y,
        )
        const handLen = Math.hypot(midTip.x - wrist.x, midTip.y - wrist.y)
        if (handLen < 30) return
        const dx = mMcp.x - wrist.x,
          dy = mMcp.y - wrist.y
        const len = Math.hypot(dx, dy) || 1
        const ux = dx / len,
          uy = dy / len
        const clawLen = handLen * 1.1,
          baseW = handLen * 0.055
        const anchors = [iMcp, mMcp, rMcp]
        ctx.save()
        anchors.forEach((anchor, i) => {
          const spread = (i - 1) * 0.14
          const cosS = Math.cos(spread),
            sinS = Math.sin(spread)
          const fdx = ux * cosS - uy * sinS,
            fdy = ux * sinS + uy * cosS
          const pdx = -fdy,
            pdy = fdx
          const tx = anchor.x + fdx * clawLen,
            ty = anchor.y + fdy * clawLen
          const grad = ctx.createLinearGradient(anchor.x, anchor.y, tx, ty)
          grad.addColorStop(0, "rgba(180,190,200,0.95)")
          grad.addColorStop(0.3, "rgba(240,245,255,0.98)")
          grad.addColorStop(0.6, "rgba(160,170,180,0.92)")
          grad.addColorStop(0.88, "rgba(200,210,220,0.85)")
          grad.addColorStop(1, "rgba(220,230,240,0.3)")
          ctx.fillStyle = grad
          ctx.shadowColor = "rgba(200,220,255,0.6)"
          ctx.shadowBlur = 8
          ctx.beginPath()
          ctx.moveTo(anchor.x + pdx * baseW, anchor.y + pdy * baseW)
          ctx.lineTo(anchor.x - pdx * baseW, anchor.y - pdy * baseW)
          ctx.lineTo(tx, ty)
          ctx.closePath()
          ctx.fill()
          ctx.strokeStyle = "rgba(255,255,255,0.75)"
          ctx.lineWidth = 1.2
          ctx.shadowColor = "rgba(255,255,255,0.9)"
          ctx.shadowBlur = 4
          ctx.globalAlpha = 0.7
          ctx.beginPath()
          ctx.moveTo(anchor.x, anchor.y)
          ctx.lineTo(
            anchor.x + fdx * clawLen * 0.85,
            anchor.y + fdy * clawLen * 0.85,
          )
          ctx.stroke()
          ctx.strokeStyle = "rgba(60,70,80,0.5)"
          ctx.lineWidth = 0.7
          ctx.shadowBlur = 0
          ctx.globalAlpha = 0.5
          ctx.beginPath()
          ctx.moveTo(anchor.x + fdx * 0.1, anchor.y + fdy * 0.1)
          ctx.lineTo(tx, ty)
          ctx.stroke()
          ctx.globalAlpha = 0.5
          ctx.shadowBlur = 0
          const kg = ctx.createRadialGradient(
            anchor.x,
            anchor.y,
            0,
            anchor.x,
            anchor.y,
            baseW * 2.5,
          )
          kg.addColorStop(0, "rgba(180,200,255,0.55)")
          kg.addColorStop(1, "rgba(0,0,0,0)")
          ctx.fillStyle = kg
          ctx.beginPath()
          ctx.arc(anchor.x, anchor.y, baseW * 2.5, 0, Math.PI * 2)
          ctx.fill()
        })
        ctx.globalAlpha = 1
        ctx.restore()
      }

      const EXP_WOLVERINE = {
        name: "⚡  WOLVERINE",
        useWings: false,
        useMask: true,
        useFace: true,
        onFrame(results, ctx, t) {

          drawWolverineClaws(ctx, results.leftHandLandmarks, t)
